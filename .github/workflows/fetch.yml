name: Fetch waiting times

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Fetch data
        run: |
          curl -s -o data/residents.json "https://secure1.info.gov.hk/immd/mobileapps/2bb9ae17/data/CPQueueTimeR.json"
          curl -s -o data/visitors.json "https://secure1.info.gov.hk/immd/mobileapps/2bb9ae17/data/CPQueueTimeV.json"
          cat data/residents.json
          cat data/visitors.json

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/
          git diff --quiet && git diff --staged --quiet || git commit -m "Update waiting times $(date -u '+%Y-%m-%d %H:%M')"
          git push
